networks:
  rezparse-net:
    driver: bridge

volumes:
  mongo-data:
  postgres-data:
  redis-data:

services:
  mongo:
    image: mongo:7.0.14
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db
    networks: [rezparse-net]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [rezparse-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0.14
    volumes:
      - redis-data:/data
    networks: [rezparse-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server-node:
    build: ./server-node
    env_file: .env
    ports:
      - "3001:3001"
    volumes:
      - ./server-node/src:/app/src
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [rezparse-net]

  server-spring:
    build: ./server-spring
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [rezparse-net]

  client:
    build: ./client
    ports:
      - "5173:5173"
    networks: [rezparse-net]

  nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on: [server-node, server-spring, client]
    networks: [rezparse-net]